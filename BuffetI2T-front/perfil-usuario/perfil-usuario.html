<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Menú - Mi Cuenta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="perfil-usuario.css" />
</head>
<body class="bg-light">
    <div class="d-flex" id="wrapper">
        
        <nav class="bg-white border-end" id="sidebar-wrapper">
            <div class="sidebar-heading p-4 text-center">
                <img src="../img/buffet_logo.png" alt="Logo" width="40" class="me-2">
                <span class="fw-bold">BUFFET</span>
            </div>
            <div class="list-group list-group-flush mt-3">
                <span class="list-group-item list-group-item-action text-center text-muted small" id="user-greeting">👋 Hola, Usuario</span>
                <a href="#" class="list-group-item list-group-item-action p-3 active" id="menu-link">🍴 Menú Semanal</a>
                <a href="#" class="list-group-item list-group-item-action p-3" id="favoritos-link">★ Mis Favoritos</a>
                <a href="../modificar-perfil-usuario/modificar-perfil-usuario.html" class="list-group-item list-group-item-action p-3" id="modificar-link">⚙️ Modificar Perfil</a>
                <a href="#" class="list-group-item list-group-item-action p-3 text-danger" onclick="cerrarSesion()">🚪 Cerrar Sesión</a>
            </div>
        </nav>

        <div id="page-content-wrapper">
            
            <header class="navbar navbar-light bg-white border-bottom shadow-sm">
                <div class="container-fluid">
                    <h2 class="h5 mb-0">Selecciona tu Pedido Personal</h2>
                    <button id="confirmarPedidoBtn" class="btn btn-primary">Revisar Pedido</button>
                </div>
            </header>

            <div class="container-fluid p-4">
                <h1 class="mt-4 mb-3" id="content-title">Menú de Platos Disponibles</h1>
                <p class="text-muted" id="content-subtitle">Menú completo para todos los días hábiles. Selecciona la cantidad.</p>
                
                <div id="menu-container" class="row g-4 mb-5">
                    <p class="text-center text-muted">Cargando platos...</p>
                </div>
                
                <div class="card shadow-sm" id="resumen-flotante">
                    <div class="card-header bg-light">
                        <h5 class="mb-0">Resumen del Pedido</h5>
                    </div>
                    <div class="card-body">
                        <div id="resumen-pedido">
                            <p class="text-muted small">Aún no seleccionaste platos.</p>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="perfil-usuario.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
