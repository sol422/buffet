<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buffet - Menú Semanal</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="home.css" />
</head>

<body>

    <main class="container-fluid py-4">
        <div class="row">

            <!-- ===========================
                 SIDEBAR IZQUIERDA
            ============================== -->
            <aside class="col-lg-3 sidebar d-flex flex-column">

                <div class="daybar mb-4">
                    <h4 class="mb-2">PLATOS DE LA SEMANA</h4>
                    <p class="text-muted small">Selecciona un día para ver el menú.</p>

                    <!-- Botones dinámicos de días -->
                    <div class="list-group day-buttons-container" id="day-buttons-container"></div>
                </div>

                <!-- Confirmar pedido -->
                <button id="revisarPedidoBtn" class="btn btn-success btn-lg w-100">
                    Confirmar Pedido
                </button>

                <a href="../modificar-perfil/modificar-perfil.html"
                    class="btn btn-outline-primary btn-sm mt-3 w-100">
                    Modificar días de asistencia
                </a>
            </aside>

            <!-- ===========================
                 CONTENIDO PRINCIPAL
            ============================== -->
            <div class="col-lg-9 p-4 contenido">

                <!-- Banner -->
                <div class="banner rounded-3 mb-4">
                    <div class="container-fluid py-4">
                        <h1 class="display-6 fw-bold">Menú Semanal</h1>
                        <p class="fs-5">¡Selecciona tu pedido!</p>
                    </div>
                </div>

                <!-- Contenedor dinámico de menús -->
                <div class="row g-4" id="menu-container"></div>

            </div>
        </div>
    </main>

    <!-- NAVBAR -->
    <script src="../components/navbar.js"></script>

    <!-- ===========================
         TODO TU CÓDIGO JS COMPLETO
         (NO CAMBIÉ NADA)
    ============================== -->
    <script>
        /* ============================================================
           VARIABLES GLOBALES
        ============================================================ */
        let diaSeleccionado = "";
        let seleccionUsuario = {};
        let menuCompleto = [];
        let diasDeAsistencia = [];

        /* ============================================================
           INICIALIZACIÓN
        ============================================================ */
        document.addEventListener("DOMContentLoaded", () => {

            // Cargar pedido repetido si existe
            const pedidoRepetido = localStorage.getItem('pedido_repetido');
            if (pedidoRepetido) {
                seleccionUsuario = JSON.parse(pedidoRepetido);
                localStorage.removeItem('pedido_repetido');
                alert("Se cargó el pedido repetido. Revisalo antes de confirmar.");
            }

            // Cargar pedido guardado previamente
            const guardado = localStorage.getItem('pedidoActual');
            if (guardado) seleccionUsuario = { ...seleccionUsuario, ...JSON.parse(guardado) };

            actualizarResumenPedido();
            fetchMenuActualFiltrado();

            document.getElementById("revisarPedidoBtn").addEventListener("click", () => {
                const pedido = construirPedidoDesdeSeleccion();
                if (!validarPedidoAntesDeConfirmar(pedido)) return;

                localStorage.setItem('pedidoActual', JSON.stringify(seleccionUsuario));
                window.location.href = '../modificar-pedido/modificar-pedido.html';
            });

            // Refresca el menú automáticamente cada 10 segundos
            setInterval(fetchMenuActualFiltrado, 10000);
        });

        /* ============================================================
           OBTENER MENÚ DINÁMICO
        ============================================================ */
        async function fetchMenuActualFiltrado() {
            const idUsuario = localStorage.getItem('id');
            const menuContainer = document.getElementById("menu-container");

            if (!idUsuario) {
                menuContainer.innerHTML = `<p class="text-danger">No se pudo identificar al usuario.</p>`;
                return;
            }

            try {
                const response = await fetch(`http://localhost:3000/api/empleado/menu-actual/${idUsuario}`);
                if (!response.ok) throw new Error('No se pudo cargar el menú.');
                menuCompleto = await response.json();

                const diasUnicos = [...new Set(menuCompleto.map(item => item.nombre_dia))];
                diasDeAsistencia = ['LUNES', 'MARTES', 'MIERCOLES', 'JUEVES', 'VIERNES']
                    .filter(dia => diasUnicos.includes(dia));

                actualizarBotonesDeDia();

                if (diasDeAsistencia.length > 0) {
                    const hoyStr = ['DOMINGO','LUNES','MARTES','MIERCOLES','JUEVES','VIERNES','SABADO'][new Date().getDay()];
                    const diaParaMostrar = diasDeAsistencia.includes(hoyStr) ? hoyStr : diasDeAsistencia[0];
                    cambiarDia(diaParaMostrar);
                } else {
                    menuContainer.innerHTML = `
                        <div class="col-12">
                            <p class="alert alert-warning">No tienes días de asistencia configurados o no hay menú disponible.</p>
                        </div>`;
                }

            } catch (error) {
                console.error(error);
                menuContainer.innerHTML = `
                    <div class="col-12">
                        <p class="alert alert-danger">${error.message}</p>
                    </div>`;
            }
        }

        /* ============================================================
           BOTONES DE DÍAS
        ============================================================ */
        function actualizarBotonesDeDia() {
            const container = document.getElementById('day-buttons-container');
            container.innerHTML = '';

            diasDeAsistencia.forEach(dia => {
                const button = document.createElement('a');
                button.href = "#";
                button.id = `btn-${dia}`;
                button.className = 'list-group-item list-group-item-action';
                button.textContent = dia.charAt(0).toUpperCase() + dia.slice(1).toLowerCase();

                button.onclick = e => {
                    e.preventDefault();
                    cambiarDia(dia);
                };

                container.appendChild(button);
            });
        }

        function cambiarDia(nuevoDia) {
            diaSeleccionado = nuevoDia;

            document.querySelectorAll(".list-group-item").forEach(btn =>
                btn.classList.remove("active")
            );

            const botonActivo = document.getElementById(`btn-${nuevoDia}`);
            if (botonActivo) botonActivo.classList.add("active");

            mostrarMenusPorDia();
        }

        /* ============================================================
           MOSTRAR MENÚ DEL DÍA
        ============================================================ */
        function mostrarMenusPorDia() {
            const menuContainer = document.getElementById("menu-container");
            menuContainer.innerHTML = "";

            const menusDelDia = menuCompleto.filter(menu => menu.nombre_dia === diaSeleccionado);

            if (menusDelDia.length === 0) {
                menuContainer.innerHTML = `
                    <div class="col-12">
                        <p class="alert alert-info">No hay menús disponibles para este día.</p>
                    </div>`;
                return;
            }

            // <-- CLAVE DE LA CORRECCIÓN: Usar un Set para eliminar duplicados del backend
            const renderedItems = new Set();
            
            menusDelDia.forEach(menu => {
                const platoId = menu.id; 
                
                // Si el plato (por su ID) ya se renderizó, lo saltamos
                if (renderedItems.has(platoId)) {
                    return; 
                }
                
                // Marcamos el plato como renderizado
                renderedItems.add(platoId); 
                // <-- FIN DE LA CORRECCIÓN

                const claveUnica = `${diaSeleccionado}-${menu.id}`;
                const cantidadGuardada = seleccionUsuario[claveUnica]?.cantidad || 0;

                const cardDiv = document.createElement('div');
                cardDiv.className = 'col-md-6 col-lg-4';

                cardDiv.innerHTML = `
                    <div class="card h-100 ${cantidadGuardada > 0 ? 'border-success border-2' : ''}">
                        <img src="${menu.imagen_url}" class="card-img-top" alt="${menu.nombre}">
                        <div class="card-body d-flex flex-column">
                            <h5 class="card-title">${menu.nombre}</h5>
                            <p class="card-text text-muted small">${menu.categoria}</p>
                            <p class="card-text">${menu.descripcion}</p>

                            <div class="input-group mt-auto">
                                <span class="input-group-text">Cantidad:</span>
                                <input type="number" class="form-control" id="cantidad-${claveUnica}"
                                       min="0" value="${cantidadGuardada}">
                            </div>
                        </div>
                    </div>
                `;

                menuContainer.appendChild(cardDiv);

                document.getElementById(`cantidad-${claveUnica}`).addEventListener('input', e => {
                    const cantidad = parseInt(e.target.value, 10);

                    if (cantidad > 0) {
                        seleccionUsuario[claveUnica] = { ...menu, cantidad };
                        e.target.closest('.card').classList.add('border-success', 'border-2');
                    } else {
                        delete seleccionUsuario[claveUnica];
                        e.target.closest('.card').classList.remove('border-success', 'border-2');
                    }

                    actualizarResumenPedido();
                });
            });
            
            aplicarPedidoRepetidoEnPantalla(); // Se llama una vez al final
        }

        /* ============================================================
           RESUMEN DEL PEDIDO
        ============================================================ */
        function actualizarResumenPedido() {
            const container = document.getElementById('resumen-pedido-container');
            const accionesContainer = document.getElementById('acciones-resumen-container');

            if (!container || !accionesContainer) return;

            if (Object.keys(seleccionUsuario).length === 0) {
                container.innerHTML = `
                    <p class="text-muted small text-center">Aún no has seleccionado platos.</p>`;
                accionesContainer.innerHTML = '';
                return;
            }

            let html = `
                <h6 class="text-dark">Resumen del pedido:</h6>
                <ul class="list-group list-group-flush mb-2 small">`;

            const diasOrden = { LUNES:1, MARTES:2, MIERCOLES:3, JUEVES:4, VIERNES:5 };

            const itemsOrdenados = Object.values(seleccionUsuario)
                .sort((a, b) => (diasOrden[a.nombre_dia] || 99) - (diasOrden[b.nombre_dia] || 99));

            itemsOrdenados.forEach(item => {
                html += `
                    <li class="list-group-item d-flex justify-content-between align-items-center bg-transparent p-1">
                        <span><strong>${(item.nombre_dia || "Día").substring(0,3)}:</strong> ${item.nombre}</span>
                        <span class="badge bg-success rounded-pill">x${item.cantidad}</span>
                    </li>`;
            });

            html += '</ul>';
            container.innerHTML = html;
        }

        /* ============================================================
           LIMPIAR, CONSTRUIR, VALIDAR Y ENVIAR PEDIDO
        ============================================================ */
        function limpiarPedido() {
            if (!confirm("¿Estás seguro de que quieres limpiar tu selección actual?")) return;

            seleccionUsuario = {};
            localStorage.removeItem('pedidoActual');

            actualizarResumenPedido();
            mostrarMenusPorDia();
        }

        function revisarPedido() {
            const pedido = construirPedidoDesdeSeleccion();
            if (!validarPedidoAntesDeConfirmar(pedido)) return;

            localStorage.setItem('pedidoActual', JSON.stringify(seleccionUsuario));
            window.location.href = '../modificar-pedido/modificar-pedido.html';
        }

        function construirPedidoDesdeSeleccion() {
            const detalles = [];

            for (const clave in seleccionUsuario) {
                const item = seleccionUsuario[clave];
                detalles.push({
                    id_item_menu: item.id,
                    id_dia: item.id_dia,
                    cantidad: item.cantidad
                });
            }

            const semana = obtenerSemanaActual();
            const id_usuario = localStorage.getItem('id');

            return { id_usuario, semana, detalles };
        }

        function validarPedidoAntesDeConfirmar(pedido) {
            if (!pedido.detalles.length) {
                alert("No seleccionaste ningún plato para enviar.");
                return false;
            }

            if (!diasDeAsistencia || diasDeAsistencia.length === 0) {
                alert("Error: No se pudieron verificar tus días de asistencia. Intenta recargar la página.");
                return false;
            }

            const diasSeleccionados = new Set();

            for (const clave in seleccionUsuario) {
                const item = seleccionUsuario[clave];
                if (item.cantidad > 0 && item.nombre_dia) diasSeleccionados.add(item.nombre_dia);
            }

            const diasFaltantes = diasDeAsistencia.filter(dia => !diasSeleccionados.has(dia));

            if (diasFaltantes.length > 0) {
                alert(
                    `¡Atención! No has seleccionado ningún plato para los siguientes días:\n\n- ${diasFaltantes.join('\n- ')}\n\n` +
                    `Si no vas a asistir esos días, usa el botón "Modificar días de asistencia".`
                );
                return false;
            }

            return true;
        }

        async function enviarPedidoAlServidor(pedido) {
            try {
                const res = await fetch('http://localhost:3000/api/pedido', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(pedido)
                });

                const data = await res.json();

                if (!res.ok) throw new Error(data.error || 'Error al enviar el pedido');

                alert(`Pedido confirmado con éxito ✅\nID de Pedido: ${data.pedidoId}`);

                localStorage.removeItem('pedidoActual');
                window.location.href = '../historial/historial.html';

            } catch (error) {
                console.error(error);
                alert("No se pudo enviar el pedido: " + error.message);
            }
        }

        function obtenerSemanaActual() {
            const hoy = new Date();
            const primerDiaDelAño = new Date(hoy.getFullYear(), 0, 1);
            const diasTranscurridos = Math.floor((hoy - primerDiaDelAño) / (1000 * 60 * 60 * 24));

            return Math.ceil((diasTranscurridos + primerDiaDelAño.getDay() + 1) / 7);
        }

        /* ============================================================
           APLICAR PEDIDO REPETIDO
        ============================================================ */
        function aplicarPedidoRepetidoEnPantalla() {
            if (!seleccionUsuario || Object.keys(seleccionUsuario).length === 0) return;

            for (const clave in seleccionUsuario) {
                const item = seleccionUsuario[clave];

                const input = document.getElementById(`cantidad-${clave}`);
                if (!input) continue;

                input.value = item.cantidad;

                const card = input.closest('.card');
                if (card) {
                    card.classList.add('border-success', 'border-2');
                }
            }

            actualizarResumenPedido();
        }
    </script>

    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
