<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modificar Perfil Básico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../modificar-perfil/modificar-perfil.css" /> 
</head>
<body class="bg-light">
    <user-header></user-header>

    <main class="container my-5">
        <div class="row justify-content-center">
            <div class="col-11 col-sm-10 col-md-8 col-lg-6">
                <div class="card shadow">
                    <div class="card-body p-4 p-md-5">
                        <h1 class="card-title text-center mb-4">Modificar Datos</h1>
                        <p class="text-center text-muted">Actualiza tu información personal.</p>
                        
                        <form onsubmit="event.preventDefault(); guardarCambiosBasicos()">
                            <div class="form-floating mb-3">
                                <input type="text" class="form-control" id="nombre" placeholder="Nombre" required />
                                <label for="nombre">Nombre</label>
                            </div>

                            <div class="form-floating mb-3">
                                <input type="text" class="form-control" id="apellido" placeholder="Apellido" required />
                                <label for="apellido">Apellido</label>
                            </div>

                            <div class="form-floating mb-3">
                                <input type="email" class="form-control" id="email" placeholder="E-mail" required />
                                <label for="email">E-mail</label>
                            </div>

                            <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                                <a class="btn btn-secondary" href="perfil-usuario.html">Cancelar</a>
                                <button type="submit" class="btn btn-primary">Guardar Cambios</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="../components/navbar-usuario.js"></script>
    <script>
        // Lógica JS para esta vista (la puedes poner en un nuevo archivo JS si lo prefieres)
        document.addEventListener("DOMContentLoaded", () => {
            cargarDatosDelPerfilBasico();
        });

        async function cargarDatosDelPerfilBasico() {
            const idUsuario = localStorage.getItem("id");
            if (!idUsuario) {
                alert("Error: No se encontró sesión.");
                window.location.href = "../index.html";
                return;
            }

            try {
                // Usamos la misma ruta de perfil de usuario para obtener los datos
                const response = await fetch(`http://localhost:3000/api/usuario/perfil/${idUsuario}`);
                if (!response.ok) throw new Error("No se pudo obtener la información del perfil.");
                
                const perfil = await response.json();

                document.getElementById("nombre").value = perfil.nombre || "";
                document.getElementById("apellido").value = perfil.apellido || "";
                document.getElementById("email").value = perfil.email || "";

            } catch (error) {
                console.error("Error al cargar el perfil:", error);
                alert("Hubo un error al cargar tus datos. Intenta de nuevo.");
            }
        }

        async function guardarCambiosBasicos() {
            const nombre = document.getElementById("nombre").value.trim();
            const apellido = document.getElementById("apellido").value.trim();
            const email = document.getElementById("email").value.trim();
            
            const datosParaEnviar = { nombre, apellido, email };
            const emailOriginal = localStorage.getItem("email"); // Usamos el email original para la ruta PUT

            try {
                const response = await fetch(`http://localhost:3000/api/usuario/perfil/${emailOriginal}`, {
                    method: "PUT",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(datosParaEnviar)
                });

                const data = await response.json();

                if (response.ok) {
                    alert("Perfil actualizado correctamente.");
                    // Actualizar localStorage con los nuevos datos
                    localStorage.setItem("nombre", datosParaEnviar.nombre);
                    localStorage.setItem("apellido", datosParaEnviar.apellido);
                    localStorage.setItem("email", datosParaEnviar.email);
                    window.location.href = "perfil-usuario.html"; 
                } else if (response.status === 409) {
                     alert(data.error); // Mensaje de email duplicado
                } else {
                    throw new Error(data.error || "Error al actualizar el perfil.");
                }
            } catch (error) {
                console.error("Error al conectar con el servidor:", error);
                alert("Error de conexión con el servidor.");
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
